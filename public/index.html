<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualysMind — AI Vulnerability Assistant</title>
    <meta name="description"
        content="QualysMind is an AI-powered chatbot for the Qualys VMDR platform, helping security teams manage vulnerabilities through natural language.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- ── Sidebar ──────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button class="new-chat-btn" id="newChatBtn" title="New conversation">
                <span class="material-symbols-rounded">add</span>
                <span>New Chat</span>
            </button>
        </div>
        <div class="sidebar-history" id="chatHistory">
            <!-- Future: conversation history list -->
        </div>
        <div class="sidebar-bottom">
            <div class="sidebar-status" id="sidebarStatus">
                <span class="status-dot"></span>
                <span class="status-text" id="statusText">Connecting...</span>
            </div>
        </div>
    </aside>

    <!-- ── Main Content ────────────────────────────────────── -->
    <div class="main-content">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <button class="icon-btn sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                    <span class="material-symbols-rounded">menu</span>
                </button>
                <div class="logo">
                    <div class="logo-shield">
                        <span class="material-symbols-rounded logo-icon">shield</span>
                    </div>
                    <div class="logo-text">
                        <h1>QualysMind</h1>
                    </div>
                </div>
            </div>
            <div class="header-center"></div>
            <div class="header-right">
                <div class="model-selector" id="modelSelector">
                    <button class="provider-badge" id="providerBadge">
                        <span class="material-symbols-rounded">smart_toy</span>
                        <span class="badge-text">Loading...</span>
                        <span class="material-symbols-rounded badge-arrow">expand_more</span>
                    </button>
                </div>
                <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle theme">
                    <span class="material-symbols-rounded" id="themeIcon">dark_mode</span>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area">
            <!-- Quick Actions -->
            <div class="quick-actions-bar" id="quickActions">
                <!-- Populated by JS -->
            </div>

            <!-- Messages -->
            <div class="messages-wrapper">
                <div class="messages-scroll" id="chatMessages">
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-shield">
                            <span class="material-symbols-rounded">security</span>
                        </div>
                        <h2>Welcome to <span class="gradient-text">QualysMind</span></h2>
                        <p>Your AI assistant for Qualys VMDR. Ask about vulnerabilities, assets, scans, and compliance.
                        </p>
                        <div class="suggestion-chips">
                            <button class="chip" onclick="sendExample('Show me all urgent vulnerabilities')">
                                <span class="material-symbols-rounded">bug_report</span>
                                Show urgent vulns
                            </button>
                            <button class="chip" onclick="sendExample('What is our current vulnerability posture?')">
                                <span class="material-symbols-rounded">analytics</span>
                                Vuln posture
                            </button>
                            <button class="chip" onclick="sendExample('Search for CVE-2024-3094')">
                                <span class="material-symbols-rounded">search</span>
                                Search a CVE
                            </button>
                            <button class="chip" onclick="sendExample('List all running scans')">
                                <span class="material-symbols-rounded">radar</span>
                                Running scans
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Confirmation Banner -->
            <div class="confirmation-banner hidden" id="confirmationBanner">
                <div class="confirm-content">
                    <span class="material-symbols-rounded confirm-icon">warning</span>
                    <span class="confirm-text" id="confirmText"></span>
                </div>
                <div class="confirm-actions">
                    <button class="btn btn-confirm" id="confirmYes">
                        <span class="material-symbols-rounded">check</span> Confirm
                    </button>
                    <button class="btn btn-cancel" id="confirmNo">
                        <span class="material-symbols-rounded">close</span> Cancel
                    </button>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <textarea id="chatInput" placeholder="Ask about vulnerabilities, assets, scans..." rows="1"
                        autocomplete="off"></textarea>
                    <div class="input-actions">
                        <button class="send-btn" id="sendBtn" title="Send message">
                            <span class="material-symbols-rounded">arrow_upward</span>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    <span>QualysMind can make mistakes. Verify critical security decisions.</span>
                </div>
            </div>
        </main>
    </div>

    <!-- App JavaScript -->
    <script src="/js/markdown.js"></script>
    <script src="/js/avatars.js"></script>
    <script src="/js/status.js"></script>
    <script src="/js/quickActions.js"></script>
    <script src="/js/modelSelector.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
